steps:
  # Build web browser Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'asia-southeast1-docker.pkg.dev/$PROJECT_ID/wechat-automation/wechat-web:${BUILD_ID}'
      - '-t'
      - 'asia-southeast1-docker.pkg.dev/$PROJECT_ID/wechat-automation/wechat-web:latest'
      - '-f'
      - 'web/Dockerfile'
      - '.'
    id: 'build-web'

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'asia-southeast1-docker.pkg.dev/$PROJECT_ID/wechat-automation/wechat-web:${BUILD_ID}']
    waitFor: ['build-web']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'asia-southeast1-docker.pkg.dev/$PROJECT_ID/wechat-automation/wechat-web:latest']
    waitFor: ['build-web']

  # Deploy web browser to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'wechat-web'
      - '--image'
      - 'asia-southeast1-docker.pkg.dev/$PROJECT_ID/wechat-automation/wechat-web:${BUILD_ID}'
      - '--region'
      - 'asia-southeast1'
      - '--platform'
      - 'managed'
      - '--service-account'
      - 'claude@$PROJECT_ID.iam.gserviceaccount.com'
      - '--set-env-vars'
      - 'GCP_PROJECT_ID=ai-agents-go,FIRESTORE_DATABASE=wechat-documents,GCS_BUCKET=wechat-documents-attachments'
      - '--no-allow-unauthenticated'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '5'
    waitFor: ['build-web']

options:
  logging: CLOUD_LOGGING_ONLY
